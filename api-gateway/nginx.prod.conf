# nginx.prod.conf — Configuração Nginx de PRODUÇÃO
# SSL/TLS com certificado Let's Encrypt, HTTP→HTTPS redirect, HSTS, rate limit

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format json_combined escape=json
        '{"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"body_bytes":$body_bytes_sent,'
        '"duration":$request_time,'
        '"upstream_time":"$upstream_response_time",'
        '"user_agent":"$http_user_agent",'
        '"x_forwarded_for":"$http_x_forwarded_for"}';

    access_log /var/log/nginx/access.log json_combined;
    error_log  /var/log/nginx/error.log  warn;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    keepalive_requests  1000;
    gzip                on;
    gzip_min_length     1000;
    gzip_types          text/plain text/css application/json application/javascript text/xml application/xml;
    client_max_body_size 16m;
    server_tokens       off;

    # ── Rate limiting ─────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m    rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m   rate=10r/m;
    limit_req_zone $binary_remote_addr zone=global_limit:10m rate=200r/m;
    limit_req_status 429;

    # ── Upstream — microserviços ──────────────────────────────────────────────
    upstream auth_upstream {
        least_conn;
        server auth-service:8000     max_fails=3 fail_timeout=30s;
        keepalive 16;
    }
    upstream tenant_upstream    { server tenant-service:8000;       keepalive 8; }
    upstream device_upstream    { server device-service:8000;       keepalive 8; }
    upstream license_upstream   { server license-service:8000;      keepalive 8; }
    upstream event_upstream     { server event-service:8000;        keepalive 16; }
    upstream notification_upstream { server notification-service:8000; keepalive 8; }
    upstream billing_upstream   { server billing-service:8000;      keepalive 8; }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        location /.well-known/acme-challenge/ { root /var/www/certbot; }
        location / { return 301 https://$host$request_uri; }
    }

    # ── HTTPS principal ───────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name ${DOMAIN};

        # Certificados Let's Encrypt
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # Configuração SSL segura (Mozilla Modern)
        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       1d;
        ssl_session_tickets       off;
        ssl_stapling              on;
        ssl_stapling_verify       on;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options            "SAMEORIGIN" always;
        add_header X-Content-Type-Options     "nosniff" always;
        add_header X-XSS-Protection           "1; mode=block" always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:;" always;

        # Health (sem autenticação)
        location /health {
            access_log off;
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        # Status page pública
        location /status {
            root /usr/share/nginx/html;
            try_files /status.html =404;
        }

        # ── Rotas de API ──────────────────────────────────────────────────────

        location /api/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://auth_upstream/;
            include /etc/nginx/proxy_params.conf;
        }

        location /api/tenant/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://tenant_upstream/;
            include /etc/nginx/proxy_params.conf;
        }

        location /api/device/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://device_upstream/;
            include /etc/nginx/proxy_params.conf;
        }

        location /api/license/ {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://license_upstream/;
            include /etc/nginx/proxy_params.conf;
        }

        location /api/event/ {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://event_upstream/;
            include /etc/nginx/proxy_params.conf;
        }

        location /api/notification/ {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://notification_upstream/;
            include /etc/nginx/proxy_params.conf;
        }

        location /api/billing/ {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://billing_upstream/;
            include /etc/nginx/proxy_params.conf;
        }

        # WebSocket (event-service)
        location /ws/ {
            proxy_pass http://event_upstream/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
            proxy_read_timeout 86400s;
        }

        # Grafana (admin)
        location /grafana/ {
            proxy_pass http://grafana:3000/;
            include /etc/nginx/proxy_params.conf;
        }

        # Frontend (fallback SPA)
        location / {
            limit_req zone=global_limit burst=100 nodelay;
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
            expires 1h;
            add_header Cache-Control "public, max-age=3600";
        }

        # Assets imutáveis (hash no nome)
        location ~* \.(js|css|woff2|png|jpg|ico|svg)$ {
            root /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }
}
