# ============================================================================
# WiFiSense SaaS - Parâmetros de Proxy Nginx
# ============================================================================
# Configurações comuns para todos os proxies de microserviços
# ============================================================================

# Headers de proxy padrão
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host $host;
proxy_set_header X-Forwarded-Port $server_port;

# Passar tenant_id e device_id se presentes
proxy_set_header X-Tenant-ID $http_x_tenant_id;
proxy_set_header X-Device-ID $http_x_device_id;

# Timeouts (Requisito 19.8 - 30 segundos)
proxy_connect_timeout 30s;
proxy_send_timeout 30s;
proxy_read_timeout 30s;

# Buffering
proxy_buffering on;
proxy_buffer_size 4k;
proxy_buffers 8 4k;
proxy_busy_buffers_size 8k;

# HTTP version
proxy_http_version 1.1;

# Connection header para keep-alive
proxy_set_header Connection "";

# Não redirecionar automaticamente
proxy_redirect off;

# Interceptar erros
proxy_intercept_errors on;
