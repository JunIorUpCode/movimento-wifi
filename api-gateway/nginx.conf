# ============================================================================
# WiFiSense SaaS - API Gateway (Nginx)
# ============================================================================
# Gateway unificado que roteia requisições para os microserviços
# Implementa rate limiting, CORS, segurança e health checks
# Requisitos: 1.1, 19.8, 22.1, 34.1-34.4, 36.1-36.3
# ============================================================================

# Configuração de worker processes
# Ajustar baseado no número de CPUs disponíveis
worker_processes auto;
worker_rlimit_nofile 65535;

# Eventos e conexões
events {
    worker_connections 4096;  # Máximo de conexões simultâneas por worker
    use epoll;                # Método eficiente para Linux
    multi_accept on;          # Aceitar múltiplas conexões de uma vez
}

http {
    # ========================================================================
    # Configurações Básicas
    # ========================================================================
    
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Charset padrão
    charset utf-8;
    
    # Otimizações de performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    
    # Tamanhos de buffer
    client_body_buffer_size 128k;
    client_max_body_size 10m;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 16k;
    
    # Timeouts
    client_body_timeout 30s;
    client_header_timeout 30s;
    send_timeout 30s;
    
    # Ocultar versão do Nginx por segurança
    server_tokens off;
    
    # ========================================================================
    # Logging
    # ========================================================================
    
    # Formato de log estruturado em JSON
    log_format json_combined escape=json
    '{'
        '"time_local":"$time_local",'
        '"remote_addr":"$remote_addr",'
        '"request_method":"$request_method",'
        '"request_uri":"$request_uri",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time",'
        '"upstream_addr":"$upstream_addr",'
        '"http_referer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"http_x_forwarded_for":"$http_x_forwarded_for",'
        '"tenant_id":"$http_x_tenant_id"'
    '}';
    
    access_log /var/log/nginx/access.log json_combined;
    error_log /var/log/nginx/error.log warn;
    
    # ========================================================================
    # Rate Limiting (Requisitos 34.1-34.4)
    # ========================================================================
    
    # Zona de memória para rate limiting por tenant_id
    # 10m = ~160,000 IPs/tenants podem ser rastreados
    limit_req_zone $http_x_tenant_id zone=tenant_per_minute:10m rate=100r/m;
    limit_req_zone $http_x_tenant_id zone=tenant_per_hour:10m rate=1000r/h;
    
    # Zona para rate limiting por IP (fallback se tenant_id não estiver presente)
    limit_req_zone $binary_remote_addr zone=ip_per_minute:10m rate=100r/m;
    
    # Status code para rate limit excedido
    limit_req_status 429;
    
    # ========================================================================
    # Upstream Definitions (Microserviços)
    # ========================================================================
    
    # Auth Service - Autenticação e autorização
    upstream auth_service {
        least_conn;  # Load balancing: menos conexões
        server auth-service:8000 max_fails=3 fail_timeout=30s;
        # Para múltiplas instâncias, adicionar:
        # server auth-service-2:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }
    
    # Tenant Service - Gerenciamento de tenants
    upstream tenant_service {
        least_conn;
        server tenant-service:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }
    
    # Device Service - Gerenciamento de dispositivos
    upstream device_service {
        least_conn;
        server device-service:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }
    
    # License Service - Gerenciamento de licenças
    upstream license_service {
        least_conn;
        server license-service:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }
    
    # Event Service - Processamento de eventos
    upstream event_service {
        least_conn;
        server event-service:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }
    
    # Notification Service - Notificações multi-canal
    upstream notification_service {
        least_conn;
        server notification-service:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }
    
    # Billing Service - Faturamento e pagamentos
    upstream billing_service {
        least_conn;
        server billing-service:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }
    
    # ========================================================================
    # Servidor HTTP (Redireciona para HTTPS)
    # ========================================================================
    
    server {
        listen 80;
        listen [::]:80;
        server_name api.wifisense.local localhost;
        
        # Redirecionar todo tráfego HTTP para HTTPS
        # Em produção, descomentar:
        # return 301 https://$server_name$request_uri;
        
        # Para desenvolvimento local, permitir HTTP
        location / {
            # Redirecionar para o servidor HTTPS
            return 301 https://$server_name$request_uri;
        }
        
        # Health check pode ser acessado via HTTP
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }
    
    # ========================================================================
    # Servidor HTTPS Principal
    # ========================================================================
    
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name api.wifisense.local localhost;
        
        # ====================================================================
        # Configuração SSL/TLS (Requisito 19.8)
        # ====================================================================
        
        # Certificados SSL
        # Em produção, usar certificados Let's Encrypt
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        
        # Protocolos SSL permitidos (apenas TLS 1.2 e 1.3)
        ssl_protocols TLSv1.2 TLSv1.3;
        
        # Ciphers seguros
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers off;
        
        # Session cache para performance
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;
        
        # OCSP Stapling
        ssl_stapling on;
        ssl_stapling_verify on;
        
        # ====================================================================
        # Headers de Segurança (Requisito 19.8)
        # ====================================================================
        
        # HSTS - Force HTTPS por 1 ano
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        
        # Prevenir clickjacking
        add_header X-Frame-Options "SAMEORIGIN" always;
        
        # Prevenir MIME type sniffing
        add_header X-Content-Type-Options "nosniff" always;
        
        # XSS Protection
        add_header X-XSS-Protection "1; mode=block" always;
        
        # Referrer Policy
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        
        # Content Security Policy
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;
        
        # Permissions Policy
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        
        # ====================================================================
        # CORS Configuration (Requisito 19.8)
        # ====================================================================
        
        # Domínios autorizados (ajustar em produção)
        set $cors_origin "";
        
        if ($http_origin ~* (https?://(localhost|127\.0\.0\.1|.*\.wifisense\.local)(:[0-9]+)?$)) {
            set $cors_origin $http_origin;
        }
        
        # Headers CORS
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Tenant-ID, X-Device-ID" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Max-Age "3600" always;
        
        # Responder OPTIONS requests (preflight)
        if ($request_method = 'OPTIONS') {
            return 204;
        }
        
        # ====================================================================
        # Health Check Endpoint (Requisitos 36.1-36.3)
        # ====================================================================
        
        location /health {
            access_log off;
            default_type application/json;
            content_by_lua_block {
                -- Este endpoint será implementado via proxy para um serviço de health check
                ngx.say('{"status":"operational","timestamp":"' .. ngx.time() .. '"}')
            }
        }
        
        # Health check detalhado (apenas para monitoramento interno)
        location /health/detailed {
            access_log off;
            allow 127.0.0.1;
            allow 172.16.0.0/12;  # Docker network
            deny all;
            
            default_type application/json;
            return 200 '{"status":"operational","services":{"auth":"ok","tenant":"ok","device":"ok","license":"ok","event":"ok","notification":"ok","billing":"ok"}}';
        }
        
        # ====================================================================
        # Rate Limiting Headers (Requisitos 34.3-34.4)
        # ====================================================================
        
        # Adicionar headers de rate limit em todas as respostas
        add_header X-RateLimit-Limit "100" always;
        add_header X-RateLimit-Remaining $limit_req_remaining always;
        
        # ====================================================================
        # Rotas para Microserviços
        # ====================================================================
        
        # Auth Service - Autenticação
        location /api/auth/ {
            # Rate limiting
            limit_req zone=tenant_per_minute burst=20 nodelay;
            limit_req zone=tenant_per_hour burst=100 nodelay;
            
            proxy_pass http://auth_service/api/auth/;
            include /etc/nginx/proxy_params.conf;
        }
        
        # Tenant Service - Gerenciamento de tenants (Admin only)
        location /api/admin/tenants {
            # Rate limiting mais permissivo para admins
            limit_req zone=tenant_per_minute burst=50 nodelay;
            
            proxy_pass http://tenant_service/api/admin/tenants;
            include /etc/nginx/proxy_params.conf;
        }
        
        # Device Service - Gerenciamento de dispositivos
        location /api/devices {
            # Rate limiting
            limit_req zone=tenant_per_minute burst=30 nodelay;
            limit_req zone=tenant_per_hour burst=200 nodelay;
            
            proxy_pass http://device_service/api/devices;
            include /etc/nginx/proxy_params.conf;
        }
        
        # License Service - Gerenciamento de licenças
        location /api/licenses {
            # Rate limiting
            limit_req zone=tenant_per_minute burst=20 nodelay;
            
            proxy_pass http://license_service/api/licenses;
            include /etc/nginx/proxy_params.conf;
        }
        
        location /api/admin/licenses {
            # Rate limiting para admins
            limit_req zone=tenant_per_minute burst=50 nodelay;
            
            proxy_pass http://license_service/api/admin/licenses;
            include /etc/nginx/proxy_params.conf;
        }
        
        # Event Service - Eventos
        location /api/events {
            # Rate limiting
            limit_req zone=tenant_per_minute burst=50 nodelay;
            limit_req zone=tenant_per_hour burst=500 nodelay;
            
            proxy_pass http://event_service/api/events;
            include /etc/nginx/proxy_params.conf;
        }
        
        # Notification Service - Notificações
        location /api/notifications {
            # Rate limiting
            limit_req zone=tenant_per_minute burst=20 nodelay;
            
            proxy_pass http://notification_service/api/notifications;
            include /etc/nginx/proxy_params.conf;
        }
        
        # Billing Service - Faturamento
        location /api/billing {
            # Rate limiting
            limit_req zone=tenant_per_minute burst=20 nodelay;
            
            proxy_pass http://billing_service/api/billing;
            include /etc/nginx/proxy_params.conf;
        }
        
        # WebSocket endpoint (será implementado na Task 17)
        location /ws {
            proxy_pass http://event_service/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts para WebSocket
            proxy_connect_timeout 7d;
            proxy_send_timeout 7d;
            proxy_read_timeout 7d;
        }
        
        # Catch-all para rotas não encontradas
        location / {
            return 404 '{"error":"Not Found","message":"Endpoint não encontrado"}';
            add_header Content-Type application/json;
        }
    }
}
