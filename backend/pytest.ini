[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts =
    --tb=short
    -q
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning

[coverage:run]
source = app
omit =
    app/api/*
    app/main.py
    app/capture/rssi_linux.py
    app/capture/rssi_windows.py
    app/capture/rssi_placeholder.py
    app/capture/csi_placeholder.py
    app/services/notification_channels.py
    app/services/notification_service.py
    app/services/monitor_service.py
    app/services/behavior_service.py
    app/services/performance_service.py
    app/services/alert_service.py
    app/core/exceptions.py
    app/detection/detection_utils.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if __name__ == .__main__.:
    raise NotImplementedError
    pass
