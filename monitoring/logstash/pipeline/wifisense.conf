# Logstash — Pipeline de processamento de logs do WiFiSense

input {
  # Recebe logs via TCP (JSON) dos microserviços
  tcp {
    port => 5000
    codec => json_lines
    tags => ["tcp"]
  }

  # Recebe logs via Beats (Filebeat/Fluentd)
  beats {
    port => 5044
    tags => ["beats"]
  }
}

filter {
  # Parseia timestamp ISO8601
  date {
    match => ["timestamp", "ISO8601", "yyyy-MM-dd'T'HH:mm:ss", "yyyy-MM-dd'T'HH:mm:ssZ"]
    target => "@timestamp"
    remove_field => ["timestamp"]
  }

  # Normaliza o campo de nível de log
  if [levelname] {
    mutate {
      rename => { "levelname" => "level" }
      uppercase => ["level"]
    }
  }
  if [level] {
    mutate { uppercase => ["level"] }
  }

  # Adiciona geolocalização a IPs (opcional)
  if [client_ip] and [client_ip] != "127.0.0.1" {
    geoip {
      source => "client_ip"
      target => "geoip"
    }
  }

  # Classifica eventos de detecção
  if [event_type] == "event_detected" {
    mutate {
      add_tag => ["detection_event"]
    }
  }

  # Classifica erros HTTP 5xx
  if [status_code] and [status_code] >= 500 {
    mutate {
      add_tag => ["http_error"]
      add_field => { "alert" => "true" }
    }
  }

  # Remove campos internos desnecessários
  mutate {
    remove_field => ["host", "port", "path", "tags"]
  }
}

output {
  # Envia para Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "wifisense-logs-%{+YYYY.MM.dd}"
    template_name => "wifisense"
    template_overwrite => false
  }

  # Debug local (desative em produção)
  # stdout { codec => rubydebug }
}
