name: CD — Deploy WiFiSense (Produção)

on:
  push:
    tags:
      - "v*.*.*"   # Dispara em tags de versão: v1.0.0, v1.2.3, etc.
  workflow_dispatch:
    inputs:
      environment:
        description: "Ambiente de deploy"
        required: true
        default: "production"
        type: choice
        options: [production, staging]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/wifisense

jobs:
  # ── Build e Push das imagens Docker ──────────────────────────────────────
  build-and-push:
    name: Build e Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - auth-service
          - tenant-service
          - device-service
          - license-service
          - event-service
          - notification-service
          - billing-service

    steps:
      - uses: actions/checkout@v4

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extrai metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e Push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy via SSH ────────────────────────────────────────────────────────
  deploy:
    name: Deploy para ${{ inputs.environment || 'production' }}
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: ${{ inputs.environment || 'production' }}

    steps:
      - uses: actions/checkout@v4

      - name: Determina versão do deploy
        id: version
        run: echo "tag=${GITHUB_REF_NAME:-latest}" >> $GITHUB_OUTPUT

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/wifisense

            echo "Baixando docker-compose de produção..."
            git pull origin main

            echo "Atualizando imagens para versão ${{ steps.version.outputs.tag }}..."
            export IMAGE_TAG=${{ steps.version.outputs.tag }}
            docker compose -f docker-compose.prod.yml pull

            echo "Aplicando deploy com zero-downtime..."
            docker compose -f docker-compose.prod.yml up -d \
              --remove-orphans \
              --no-build

            echo "Aguardando health checks..."
            sleep 30

            echo "Verificando status..."
            docker compose -f docker-compose.prod.yml ps

            echo "Deploy ${{ steps.version.outputs.tag }} concluído!"

      - name: Notifica no Slack (opcional)
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          STATUS="${{ job.status }}"
          COLOR=$([[ "$STATUS" == "success" ]] && echo "good" || echo "danger")
          curl -s -X POST "$SLACK_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"attachments\":[{\"color\":\"$COLOR\",\"text\":\"WiFiSense deploy ${{ steps.version.outputs.tag }}: $STATUS\"}]}" \
          || true
        continue-on-error: true
