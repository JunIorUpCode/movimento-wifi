name: CI — WiFiSense

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ── Backend: lint + testes ───────────────────────────────────────────────
  backend-test:
    name: Backend — Pytest + Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: wifisense
          POSTGRES_PASSWORD: wifisense_test
          POSTGRES_DB: wifisense_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements.txt pytest-cov

      - name: Rodar testes unitários + cobertura
        env:
          DATABASE_URL: postgresql://wifisense:wifisense_test@localhost:5432/wifisense_test
          ENCRYPTION_KEY: test-encryption-key-for-ci-only
          JWT_SECRET_KEY: test-jwt-secret-ci-only
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            -q --tb=short

      - name: Upload coverage para Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          flags: backend
        continue-on-error: true

  # ── Lint Python ──────────────────────────────────────────────────────────
  backend-lint:
    name: Backend — Ruff Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff
      - run: ruff check backend/app shared --select E,F,W --ignore E501
        continue-on-error: true

  # ── Frontend: build + type-check ────────────────────────────────────────
  frontend-build:
    name: Frontend — Build + TypeScript
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Type-check TypeScript
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build de produção
        run: npm run build

      - name: Upload artefato de build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # ── Segurança: Trivy (vulnerabilidades) ──────────────────────────────────
  security-scan:
    name: Segurança — Trivy Scan
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 0     # não falha o CI em vulnerabilidades (apenas reporta)
          format: table

  # ── Docker Build (validação) ──────────────────────────────────────────────
  docker-build:
    name: Docker — Validar Builds
    runs-on: ubuntu-latest
    needs: [backend-test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build auth-service (validação)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/auth-service/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
