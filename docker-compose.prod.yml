version: '3.8'

# WiFiSense SaaS — Ambiente de PRODUÇÃO
# Diferenças do docker-compose.yml:
#   - Lê segredos de variáveis de ambiente (nunca hardcoded)
#   - resource limits em todos os serviços
#   - restart: always (não unless-stopped)
#   - volumes nomeados com driver local explícito
#   - logging com limites de tamanho
#   - healthchecks refinados
#   - sem volumes de código-fonte montados (imagens finais)
#
# Uso:
#   export $(cat .env.production | xargs) && docker compose -f docker-compose.prod.yml up -d

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "5"

x-service-base: &service-base
  restart: always
  logging: *default-logging
  networks:
    - wifisense-prod

x-env-common: &env-common
  DATABASE_HOST: postgres
  DATABASE_PORT: "5432"
  DATABASE_USER: ${DATABASE_USER}
  DATABASE_PASSWORD: ${DATABASE_PASSWORD}
  DATABASE_NAME: ${DATABASE_NAME}
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_PASSWORD: ${REDIS_PASSWORD}
  RABBITMQ_HOST: rabbitmq
  RABBITMQ_PORT: "5672"
  RABBITMQ_USER: ${RABBITMQ_USER}
  RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
  JWT_SECRET_KEY: ${JWT_SECRET_KEY}
  ENCRYPTION_KEY: ${ENCRYPTION_KEY}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  DEBUG: "false"

services:
  # ── Infraestrutura ────────────────────────────────────────────────────────

  postgres:
    <<: *service-base
    image: postgres:15-alpine
    container_name: wifisense-prod-postgres
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./scripts/init-schemas.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1g

  redis:
    <<: *service-base
    image: redis:7-alpine
    container_name: wifisense-prod-redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 384m

  rabbitmq:
    <<: *service-base
    image: rabbitmq:3.12-management-alpine
    container_name: wifisense-prod-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_prod_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m

  # ── Microserviços ──────────────────────────────────────────────────────────

  auth-service:
    <<: *service-base
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-wifisense/wifisense}-auth-service:${IMAGE_TAG:-latest}
    container_name: wifisense-prod-auth
    environment:
      <<: *env-common
      BCRYPT_ROUNDS: "12"
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 256m

  tenant-service:
    <<: *service-base
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-wifisense/wifisense}-tenant-service:${IMAGE_TAG:-latest}
    container_name: wifisense-prod-tenant
    environment: { <<: *env-common }
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    deploy:
      resources:
        limits:
          memory: 256m

  device-service:
    <<: *service-base
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-wifisense/wifisense}-device-service:${IMAGE_TAG:-latest}
    container_name: wifisense-prod-device
    environment: { <<: *env-common }
    depends_on:
      postgres:  { condition: service_healthy }
      redis:     { condition: service_healthy }
      rabbitmq:  { condition: service_healthy }
    deploy:
      resources:
        limits:
          memory: 256m

  license-service:
    <<: *service-base
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-wifisense/wifisense}-license-service:${IMAGE_TAG:-latest}
    container_name: wifisense-prod-license
    environment: { <<: *env-common }
    depends_on:
      postgres: { condition: service_healthy }
    deploy:
      resources:
        limits:
          memory: 256m

  event-service:
    <<: *service-base
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-wifisense/wifisense}-event-service:${IMAGE_TAG:-latest}
    container_name: wifisense-prod-event
    environment: { <<: *env-common }
    depends_on:
      postgres:  { condition: service_healthy }
      redis:     { condition: service_healthy }
      rabbitmq:  { condition: service_healthy }
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512m

  notification-service:
    <<: *service-base
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-wifisense/wifisense}-notification-service:${IMAGE_TAG:-latest}
    container_name: wifisense-prod-notification
    environment:
      <<: *env-common
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN:  ${TWILIO_AUTH_TOKEN:-}
    depends_on:
      postgres:  { condition: service_healthy }
      rabbitmq:  { condition: service_healthy }
    deploy:
      resources:
        limits:
          memory: 256m

  billing-service:
    <<: *service-base
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-wifisense/wifisense}-billing-service:${IMAGE_TAG:-latest}
    container_name: wifisense-prod-billing
    environment:
      <<: *env-common
      STRIPE_API_KEY: ${STRIPE_API_KEY}
    depends_on:
      postgres: { condition: service_healthy }
    deploy:
      resources:
        limits:
          memory: 256m

  # ── API Gateway com SSL ───────────────────────────────────────────────────

  api-gateway:
    <<: *service-base
    image: nginx:1.25-alpine
    container_name: wifisense-prod-gateway
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./api-gateway/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./ssl/certs:/etc/nginx/ssl:ro
      - gateway_prod_logs:/var/log/nginx
    depends_on:
      - auth-service
      - tenant-service
      - device-service
      - event-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128m

  # ── Monitoramento (produção) ───────────────────────────────────────────────

  prometheus:
    <<: *service-base
    image: prom/prometheus:v2.51.0
    container_name: wifisense-prod-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_prod_data:/prometheus
    deploy:
      resources:
        limits:
          memory: 512m

  grafana:
    <<: *service-base
    image: grafana/grafana:10.4.0
    container_name: wifisense-prod-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: https://${DOMAIN}/grafana
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_prod_data:/var/lib/grafana
    deploy:
      resources:
        limits:
          memory: 256m

networks:
  wifisense-prod:
    driver: bridge
    name: wifisense-prod

volumes:
  postgres_prod_data:
  redis_prod_data:
  rabbitmq_prod_data:
  prometheus_prod_data:
  grafana_prod_data:
  gateway_prod_logs:
